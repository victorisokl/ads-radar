<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>谷歌应用广告投放能力测验 · Google Ads Mastery Radar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="questions.js"></script>
<style>
  :root {
    --blue: #1a73e8; --blue-light: #e8f0fe; --blue-dark: #0d47a1;
    --green: #1e8e3e; --green-light: #e6f4ea;
    --red: #c5221f; --red-light: #fce8e6;
    --amber: #b06000; --amber-light: #fef3e2;
    --gray-50: #f8f9fa; --gray-100: #f1f3f4; --gray-200: #e8eaed;
    --gray-400: #9aa0a6; --gray-600: #5f6368; --gray-800: #3c4043; --gray-900: #202124;
    --white: #ffffff; --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  header { width: 100%; padding: 20px 40px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--gray-200); background: var(--white); }
  .logo-mark { width: 32px; height: 32px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 18px; height: 18px; }
  .logo-text { font-size: 15px; font-weight: 500; }
  .logo-sub { font-size: 13px; color: var(--gray-400); margin-left: 2px; }
  main { width: 100%; max-width: 640px; padding: 48px 24px 80px; flex: 1; }
  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .login-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--blue); text-transform: uppercase; margin-bottom: 16px; }
  .login-title { font-size: 32px; font-weight: 300; line-height: 1.25; margin-bottom: 10px; letter-spacing: -0.02em; }
  .login-title strong { font-weight: 500; }
  .login-desc { font-size: 15px; color: var(--gray-600); line-height: 1.6; margin-bottom: 40px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-800); margin-bottom: 8px; }
  input[type="text"], input[type="email"] { width: 100%; padding: 13px 16px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--gray-900); background: var(--white); outline: none; transition: border-color 0.15s; }
  input:focus { border-color: var(--blue); }
  .btn-primary { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.15s; }
  .btn-primary:hover { background: var(--blue-dark); }
  .login-note { font-size: 12px; color: var(--gray-400); text-align: center; margin-top: 20px; line-height: 1.6; }

  .level-title { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; margin-bottom: 6px; }
  .level-sub { font-size: 14px; color: var(--gray-600); margin-bottom: 32px; line-height: 1.6; }
  .level-cards { display: flex; flex-direction: column; gap: 12px; }
  .level-card { background: var(--white); border: 1.5px solid var(--gray-200); border-radius: var(--radius); padding: 20px 22px; cursor: pointer; display: flex; align-items: center; gap: 16px; transition: border-color 0.15s, transform 0.1s; text-align: left; width: 100%; font-family: 'DM Sans', sans-serif; }
  .level-card:hover { transform: translateX(3px); }
  .level-badge-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
  .level-card-name { font-size: 16px; font-weight: 500; color: var(--gray-900); margin-bottom: 3px; }
  .level-card-desc { font-size: 13px; color: var(--gray-600); line-height: 1.5; }
  .level-card-arrow { margin-left: auto; color: var(--gray-400); font-size: 18px; flex-shrink: 0; }

  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .q-counter { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--gray-400); letter-spacing: 0.06em; }
  .progress-track { flex: 1; height: 2px; background: var(--gray-200); border-radius: 2px; margin: 0 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
  .topic-tag { font-size: 11px; font-weight: 500; color: var(--blue); background: var(--blue-light); padding: 4px 10px; border-radius: 99px; }
  .q-text { font-size: 20px; font-weight: 400; line-height: 1.5; color: var(--gray-900); margin-bottom: 28px; letter-spacing: -0.01em; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt { background: var(--white); border: 1.5px solid var(--gray-200); border-radius: var(--radius); padding: 16px 18px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; color: var(--gray-800); text-align: left; transition: border-color 0.15s, background 0.15s, transform 0.1s; display: flex; align-items: flex-start; gap: 12px; }
  .opt:hover:not(:disabled) { border-color: var(--blue); background: var(--blue-light); color: var(--blue-dark); transform: translateX(2px); }
  .opt-letter { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: var(--gray-400); background: var(--gray-100); width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; transition: background 0.15s, color 0.15s; }
  .opt.correct { border-color: var(--green); background: var(--green-light); color: #0d5929; }
  .opt.correct .opt-letter { background: var(--green); color: white; }
  .opt.wrong { border-color: var(--red); background: var(--red-light); color: #7b1614; }
  .opt.wrong .opt-letter { background: var(--red); color: white; }
  .opt.reveal { border-color: var(--green); background: var(--green-light); color: #0d5929; }
  .opt.reveal .opt-letter { background: var(--green); color: white; }
  .feedback-box { margin-top: 16px; padding: 14px 16px; border-radius: var(--radius-sm); font-size: 13px; line-height: 1.65; display: none; animation: fadeIn 0.2s ease; }
  .feedback-box.show { display: block; }
  .feedback-box.correct-fb { background: var(--green-light); color: #0d5929; border-left: 3px solid var(--green); }
  .feedback-box.wrong-fb { background: var(--red-light); color: #7b1614; border-left: 3px solid var(--red); }
  .next-btn { margin-top: 24px; padding: 12px 28px; background: var(--gray-900); color: white; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; display: none; transition: background 0.15s; }
  .next-btn.show { display: inline-flex; align-items: center; gap: 6px; }
  .next-btn:hover { background: var(--gray-800); }

  .result-top { text-align: center; padding: 40px 0 32px; border-bottom: 1px solid var(--gray-200); margin-bottom: 32px; }
  .result-score { font-size: 64px; font-weight: 300; letter-spacing: -0.04em; line-height: 1; margin-bottom: 8px; }
  .result-label { font-size: 14px; color: var(--gray-600); margin-bottom: 20px; }
  .level-pill { display: inline-block; padding: 6px 18px; border-radius: 99px; font-size: 13px; font-weight: 500; }
  .pill-A { background: var(--green-light); color: var(--green); }
  .pill-B { background: var(--blue-light); color: var(--blue); }
  .pill-C { background: var(--amber-light); color: var(--amber); }
  .diag-section { margin-bottom: 32px; }
  .diag-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--gray-400); text-transform: uppercase; margin-bottom: 12px; }
  .diag-item { display: flex; gap: 12px; padding: 14px 16px; border-radius: var(--radius-sm); border: 1px solid var(--gray-200); margin-bottom: 8px; font-size: 13px; line-height: 1.6; color: var(--gray-800); background: var(--white); }
  .diag-icon { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
  .icon-good { background: var(--green-light); }
  .icon-improve { background: var(--amber-light); }
  .result-actions { display: flex; gap: 10px; }
  .btn-secondary { flex: 1; padding: 13px; background: var(--white); color: var(--gray-800); border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .btn-secondary:hover { border-color: var(--gray-400); background: var(--gray-50); }
</style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="white" stroke-width="1.5"/><path d="M9 5v4l2.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
  <div><div class="logo-text">谷歌应用广告投放能力测验 <span class="logo-sub">by Google</span></div></div>
</header>

<main>
  <div class="screen active" id="screen-login">
    <div class="login-eyebrow">Google App Campaign · 投放能力诊断</div>
    <h1 class="login-title">测一测你的<br><strong>应用广告投放能力</strong></h1>
    <p class="login-desc">从基础到高阶，三套谷歌应用广告实战场景题。完成后你会收到个人化的投放能力诊断报告。</p>
    <div class="form-group"><label for="input-company">公司名称</label><input type="text" id="input-company" placeholder="例：Zen Games" autocomplete="organization"></div>
    <div class="form-group"><label for="input-email">工作邮箱</label><input type="email" id="input-email" placeholder="例：marketing@company.com" autocomplete="email"></div>
    <div class="form-group"><label for="input-name">你的姓名（选填）</label><input type="text" id="input-name" placeholder="例：李明" autocomplete="name"></div>
    <button class="btn-primary" id="btn-start">下一步，选择难度 →</button>
    <p class="login-note">你的信息仅用于生成诊断报告，不会对外分享。</p>
  </div>

  <div class="screen" id="screen-levels">
    <div class="level-title">选择测验难度</div>
    <p class="level-sub">根据你目前的谷歌应用广告投放经验选择对应级别，每套题约5分钟完成。</p>
    <div class="level-cards" id="level-cards"></div>
  </div>

  <div class="screen" id="screen-quiz">
    <div class="quiz-header">
      <span class="q-counter" id="q-counter">01 / 06</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="topic-tag" id="topic-tag"></span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <button class="next-btn" id="next-btn">下一题 →</button>
  </div>

  <div class="screen" id="screen-result">
    <div class="result-top">
      <div style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--gray-400);text-transform:uppercase;margin-bottom:16px;" id="result-level-name"></div>
      <div class="result-score" id="result-score"></div>
      <div class="result-label" id="result-label"></div>
      <div class="level-pill" id="level-pill"></div>
    </div>
    <div class="diag-section">
      <div class="diag-label">你的应用广告投放能力诊断</div>
      <div id="diag-list"></div>
    </div>
    <div class="result-actions">
      <button class="btn-secondary" id="btn-retry">重试本关</button>
      <button class="btn-secondary" id="btn-other-level">选择其他难度</button>
    </div>
  </div>
</main>

<script>
// SUPABASE_URL, SUPABASE_KEY, ADMIN_PASSWORD 从 config.js 读取

let current = 0, score = 0, answered = false;
let wrongTopics = [], correctTopics = [];
let userData = {}, currentLevel = null;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function buildLevelCards() {
  const container = document.getElementById('level-cards');
  container.innerHTML = '';
  QUIZ_LEVELS.forEach(level => {
    const card = document.createElement('button');
    card.className = 'level-card';
    card.style.borderColor = level.color + '40';
    card.innerHTML = `<div class="level-badge-icon" style="background:${level.colorLight};color:${level.color}">${level.name}</div><div><div class="level-card-name">${level.label}</div><div class="level-card-desc">${level.description}</div></div><div class="level-card-arrow">→</div>`;
    card.onmouseenter = () => card.style.borderColor = level.color;
    card.onmouseleave = () => card.style.borderColor = level.color + '40';
    card.onclick = () => startQuiz(level);
    container.appendChild(card);
  });
}

document.getElementById('btn-start').onclick = () => {
  const company = document.getElementById('input-company').value.trim();
  const email = document.getElementById('input-email').value.trim();
  const name = document.getElementById('input-name').value.trim();
  if (!company || !email) { alert('请填写公司名称和工作邮箱'); return; }
  if (!email.includes('@')) { alert('请输入有效的邮箱地址'); return; }
  userData = { company, email, name };
  buildLevelCards();
  show('screen-levels');
};

function startQuiz(level) {
  currentLevel = level; current = 0; score = 0; answered = false;
  wrongTopics = []; correctTopics = [];
  renderQ(); show('screen-quiz');
}

function renderQ() {
  const q = currentLevel.questions[current];
  const total = currentLevel.questions.length;
  const letters = ['A','B','C','D'];
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('q-counter').textContent = `${pad(current+1)} / ${pad(total)}`;
  document.getElementById('progress-fill').style.width = `${(current/total)*100}%`;
  document.getElementById('topic-tag').textContent = q.topic;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback-box').className = 'feedback-box';
  document.getElementById('next-btn').className = 'next-btn';
  answered = false;
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((o,i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${o}</span>`;
    btn.onclick = () => select(i);
    opts.appendChild(btn);
  });
}

function select(i) {
  if (answered) return;
  answered = true;
  const q = currentLevel.questions[current];
  const btns = document.querySelectorAll('.opt');
  const fb = document.getElementById('feedback-box');
  btns.forEach(b => { b.disabled = true; b.style.cursor = 'default'; });
  if (i === q.correct) {
    score++; btns[i].classList.add('correct');
    fb.className = 'feedback-box correct-fb show'; fb.textContent = q.feedbackCorrect;
    correctTopics.push(q.topic);
  } else {
    btns[i].classList.add('wrong'); btns[q.correct].classList.add('reveal');
    fb.className = 'feedback-box wrong-fb show'; fb.textContent = q.feedbackWrong;
    wrongTopics.push(q.topic);
  }
  document.getElementById('next-btn').className = 'next-btn show';
}

document.getElementById('next-btn').onclick = () => {
  current++;
  if (current < currentLevel.questions.length) renderQ(); else showResult();
};

function showResult() {
  const total = currentLevel.questions.length;
  const pct = Math.round((score/total)*100);
  let grade, pillClass;
  if (pct >= 84) { grade = 'A · 掌握扎实'; pillClass = 'pill-A'; }
  else if (pct >= 50) { grade = 'B · 成长中'; pillClass = 'pill-B'; }
  else { grade = 'C · 继续加油'; pillClass = 'pill-C'; }
  document.getElementById('result-level-name').textContent = currentLevel.name + ' · ' + currentLevel.label;
  document.getElementById('result-score').textContent = `${score}/${total}`;
  document.getElementById('result-label').textContent = `答对率 ${pct}%`;
  const pill = document.getElementById('level-pill');
  pill.textContent = grade; pill.className = `level-pill ${pillClass}`;
  const diag = document.getElementById('diag-list');
  diag.innerHTML = '';
  const uniqueWrong = [...new Set(wrongTopics)];
  const uniqueCorrect = [...new Set(correctTopics)].filter(t => !uniqueWrong.includes(t));
  uniqueCorrect.slice(0,2).forEach(t => {
    diag.innerHTML += `<div class="diag-item"><div class="diag-icon icon-good"><svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2.5 2.5L8 3" stroke="#1e8e3e" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg></div><div><strong>${t}</strong> · 掌握良好，可作为与客户沟通的优势切入点</div></div>`;
  });
  uniqueWrong.forEach(t => {
    diag.innerHTML += `<div class="diag-item"><div class="diag-icon icon-improve"><svg width="10" height="10" viewBox="0 0 10 10"><path d="M5 3v3M5 7.5v.5" stroke="#b06000" stroke-width="1.5" stroke-linecap="round"/></svg></div><div><strong>${t}</strong> · 建议深入了解，这是提升投放效率的关键领域</div></div>`;
  });
  if (uniqueWrong.length === 0) {
    diag.innerHTML += `<div class="diag-item"><div class="diag-icon icon-good"><svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2.5 2.5L8 3" stroke="#1e8e3e" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg></div><div>全部答对，投放基础非常扎实！可以尝试更高难度的测验。</div></div>`;
  }
  saveResult(grade, pct); show('screen-result');
}

async function saveResult(grade, pct) {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/quiz_results`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ company: userData.company, email: userData.email, name: userData.name || null, score, total: currentLevel.questions.length, percentage: pct, level: currentLevel.name, wrong_topics: [...new Set(wrongTopics)], correct_topics: [...new Set(correctTopics)].filter(t => ![...new Set(wrongTopics)].includes(t)), completed_at: new Date().toISOString() })
    });
  } catch(e) { console.log('Save failed:', e); }
}

document.getElementById('btn-retry').onclick = () => startQuiz(currentLevel);
document.getElementById('btn-other-level').onclick = () => { buildLevelCards(); show('screen-levels'); };
</script>
</body>
</html>
