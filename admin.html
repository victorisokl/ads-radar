<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · 谷歌应用广告投放能力测验</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root {
    --blue: #1a73e8;
    --blue-light: #e8f0fe;
    --blue-dark: #0d47a1;
    --green: #1e8e3e;
    --green-light: #e6f4ea;
    --red: #c5221f;
    --red-light: #fce8e6;
    --amber: #b06000;
    --amber-light: #fef3e2;
    --gray-50: #f8f9fa;
    --gray-100: #f1f3f4;
    --gray-200: #e8eaed;
    --gray-400: #9aa0a6;
    --gray-600: #5f6368;
    --gray-800: #3c4043;
    --gray-900: #202124;
    --white: #ffffff;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    min-height: 100vh;
  }

  header {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .logo-mark {
    width: 28px; height: 28px;
    background: var(--blue);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-mark svg { width: 16px; height: 16px; }

  .logo-text { font-size: 14px; font-weight: 500; }
  .admin-badge {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    background: var(--gray-100);
    color: var(--gray-600);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.04em;
  }

  .btn-logout {
    font-size: 13px;
    color: var(--gray-600);
    background: none;
    border: 1px solid var(--gray-200);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-logout:hover { background: var(--gray-50); }

  .screen { display: none; }
  .screen.active { display: block; }

  /* LOGIN */
  #screen-login {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 61px);
    padding: 40px 24px;
  }

  .login-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 40px;
    width: 100%;
    max-width: 380px;
  }

  .login-card h2 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .login-card p { font-size: 13px; color: var(--gray-600); margin-bottom: 28px; }

  label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-800); margin-bottom: 6px; }

  input[type="password"], input[type="text"], input[type="email"] {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--gray-900);
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.15s;
  }

  input:focus { border-color: var(--blue); }

  .btn-primary {
    width: 100%;
    padding: 12px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }

  .btn-primary:hover { background: var(--blue-dark); }
  .error-msg { font-size: 13px; color: var(--red); margin-top: 10px; display: none; }

  /* DASHBOARD */
  #screen-dash { padding: 32px; }

  .dash-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .dash-title { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
  .dash-sub { font-size: 13px; color: var(--gray-600); margin-top: 3px; }

  .btn-refresh {
    font-size: 13px;
    color: var(--blue);
    background: var(--blue-light);
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 20px 22px;
  }

  .stat-label { font-size: 12px; color: var(--gray-600); margin-bottom: 8px; font-family: 'DM Mono', monospace; letter-spacing: 0.04em; }
  .stat-value { font-size: 28px; font-weight: 300; letter-spacing: -0.02em; }
  .stat-sub { font-size: 12px; color: var(--gray-400); margin-top: 4px; }

  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    align-items: center;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--gray-200);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    color: var(--gray-800);
    transition: all 0.15s;
  }

  .filter-btn.active { background: var(--gray-900); color: white; border-color: var(--gray-900); }
  .filter-btn:hover:not(.active) { border-color: var(--gray-400); }

  .search-input {
    margin-left: auto;
    padding: 7px 14px;
    border: 1px solid var(--gray-200);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    width: 200px;
    margin-bottom: 0;
  }

  .search-input:focus { border-color: var(--blue); }

  .table-wrap {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  th {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
    color: var(--gray-400);
    text-transform: uppercase;
    padding: 14px 18px;
    text-align: left;
    border-bottom: 1px solid var(--gray-100);
    background: var(--gray-50);
  }

  td {
    padding: 14px 18px;
    font-size: 13px;
    color: var(--gray-800);
    border-bottom: 1px solid var(--gray-100);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--gray-50); }

  .level-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
  }

  .badge-A { background: var(--green-light); color: var(--green); }
  .badge-B { background: var(--blue-light); color: var(--blue); }
  .badge-C { background: var(--amber-light); color: var(--amber); }

  .topic-pill {
    display: inline-block;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--red-light);
    color: var(--red);
    margin: 2px 2px 2px 0;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-400);
    font-size: 14px;
  }

  .loading { text-align: center; padding: 40px; color: var(--gray-400); font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="white" stroke-width="1.5"/><path d="M8 4.5v3.5l2 2" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
    <span class="logo-text">谷歌应用广告投放能力测验</span>
    <span class="admin-badge">管理后台</span>
  </div>
  <button class="btn-logout" id="btn-logout" style="display:none">退出登录</button>
</header>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="login-card">
    <h2>管理员登录</h2>
    <p>仅供内部团队使用</p>
    <label>密码</label>
    <input type="password" id="admin-pw" placeholder="输入管理员密码">
    <button class="btn-primary" id="btn-login">登录</button>
    <div class="error-msg" id="login-error">密码错误，请重试</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="screen" id="screen-dash">
  <div class="dash-top">
    <div>
      <div class="dash-title">应用广告投放能力测验记录</div>
      <div class="dash-sub" id="last-updated">正在加载数据...</div>
    </div>
    <button class="btn-refresh" id="btn-refresh">刷新数据</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">总参与客户</div>
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-sub">累计完成测验</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">A Level</div>
      <div class="stat-value" id="stat-a" style="color:var(--green)">—</div>
      <div class="stat-sub">进阶投手</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">B Level</div>
      <div class="stat-value" id="stat-b" style="color:var(--blue)">—</div>
      <div class="stat-sub">成长中</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">C Level</div>
      <div class="stat-value" id="stat-c" style="color:var(--amber)">—</div>
      <div class="stat-sub">基础阶段</div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="A">A Level</button>
    <button class="filter-btn" data-filter="B">B Level</button>
    <button class="filter-btn" data-filter="C">C Level</button>
    <input type="text" class="search-input" id="search-input" placeholder="搜索公司或邮箱...">
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>公司</th>
          <th>联系人</th>
          <th>邮箱</th>
          <th>成绩</th>
          <th>等级</th>
          <th>薄弱环节</th>
          <th>完成时间</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="7" class="loading">正在加载...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
// SUPABASE_URL, SUPABASE_KEY, ADMIN_PASSWORD 从 config.js 读取

let allData = [];
let activeFilter = 'all';

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('btn-login').onclick = () => {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    show('screen-dash');
    document.getElementById('btn-logout').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
};

document.getElementById('admin-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-login').click();
});

document.getElementById('btn-logout').onclick = () => {
  show('screen-login');
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('admin-pw').value = '';
};

document.getElementById('btn-refresh').onclick = loadData;

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderTable();
  };
});

document.getElementById('search-input').oninput = renderTable;

async function loadData() {
  document.getElementById('table-body').innerHTML = '<tr><td colspan="7" class="loading">正在加载...</td></tr>';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/quiz_results?select=*&order=completed_at.desc`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    allData = await res.json();
    updateStats();
    renderTable();
    document.getElementById('last-updated').textContent = `最后更新：${new Date().toLocaleString('zh-CN')}`;
  } catch(e) {
    document.getElementById('table-body').innerHTML = '<tr><td colspan="7" class="empty-state">加载失败，请检查 Supabase 配置</td></tr>';
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = allData.length;
  document.getElementById('stat-a').textContent = allData.filter(r => r.level === 'A').length;
  document.getElementById('stat-b').textContent = allData.filter(r => r.level === 'B').length;
  document.getElementById('stat-c').textContent = allData.filter(r => r.level === 'C').length;
}

function renderTable() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let filtered = allData;
  if (activeFilter !== 'all') filtered = filtered.filter(r => r.level === activeFilter);
  if (search) filtered = filtered.filter(r =>
    (r.company||'').toLowerCase().includes(search) ||
    (r.email||'').toLowerCase().includes(search) ||
    (r.name||'').toLowerCase().includes(search)
  );

  const tbody = document.getElementById('table-body');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无符合条件的记录</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(r => {
    const badgeClass = `badge-${r.level}`;
    const wrongPills = (r.wrong_topics || []).map(t => `<span class="topic-pill">${t}</span>`).join('');
    const date = new Date(r.completed_at).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
    return `<tr>
      <td><strong>${r.company || '—'}</strong></td>
      <td>${r.name || '—'}</td>
      <td style="color:var(--gray-600)">${r.email || '—'}</td>
      <td><strong>${r.score}/${r.total}</strong> <span style="color:var(--gray-400);font-size:12px">${r.percentage}%</span></td>
      <td><span class="level-badge ${badgeClass}">${r.level}</span></td>
      <td>${wrongPills || '<span style="color:var(--gray-400);font-size:12px">全部答对</span>'}</td>
      <td style="color:var(--gray-400);font-family:DM Mono,monospace;font-size:12px">${date}</td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
