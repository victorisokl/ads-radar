<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月度报告 · 谷歌应用广告投放能力测验</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root {
    --blue: #1a73e8; --blue-light: #e8f0fe; --blue-dark: #0d47a1;
    --green: #1e8e3e; --green-light: #e6f4ea;
    --red: #c5221f; --red-light: #fce8e6;
    --amber: #b06000; --amber-light: #fef3e2;
    --gray-50: #f8f9fa; --gray-100: #f1f3f4; --gray-200: #e8eaed;
    --gray-400: #9aa0a6; --gray-600: #5f6368; --gray-800: #3c4043; --gray-900: #202124;
    --white: #fff; --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; }
  header { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 28px; height: 28px; background: var(--blue); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 16px; height: 16px; }
  .logo-text { font-size: 14px; font-weight: 500; }
  .badge { font-size: 11px; font-family: 'DM Mono', monospace; background: var(--gray-100); color: var(--gray-600); padding: 3px 8px; border-radius: 4px; }
  .screen { display: none; }
  .screen.active { display: block; }
  #screen-login { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 61px); padding: 40px 24px; }
  .login-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 40px; width: 100%; max-width: 380px; }
  .login-card h2 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .login-card p { font-size: 13px; color: var(--gray-600); margin-bottom: 28px; }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  input[type="password"] { width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; margin-bottom: 16px; transition: border-color 0.15s; }
  input[type="password"]:focus { border-color: var(--blue); }
  .btn-primary { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-primary:hover { background: var(--blue-dark); }
  .error-msg { font-size: 13px; color: var(--red); margin-top: 10px; display: none; }
  #screen-dash { padding: 32px; }
  .dash-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
  .dash-title { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
  .dash-sub { font-size: 13px; color: var(--gray-600); margin-top: 3px; }
  .top-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  select { padding: 8px 14px; border: 1px solid var(--gray-200); border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: var(--white); outline: none; cursor: pointer; }
  .btn-action { padding: 9px 18px; border-radius: 6px; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-blue { background: var(--blue); color: white; }
  .btn-blue:hover { background: var(--blue-dark); }
  .btn-outline { background: var(--white); color: var(--gray-800); border: 1px solid var(--gray-200); }
  .btn-outline:hover { border-color: var(--gray-400); }
  .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 18px 20px; }
  .stat-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--gray-600); margin-bottom: 8px; letter-spacing: 0.04em; }
  .stat-value { font-size: 26px; font-weight: 300; letter-spacing: -0.02em; }
  .stat-sub { font-size: 12px; color: var(--gray-400); margin-top: 4px; }
  .stat-trend { font-size: 12px; font-weight: 500; margin-top: 4px; }
  .trend-up { color: var(--green); }
  .trend-down { color: var(--red); }
  .trend-same { color: var(--gray-400); }
  .section-title { font-size: 13px; font-weight: 500; color: var(--gray-800); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .table-wrap { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; margin-bottom: 28px; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; color: var(--gray-400); text-transform: uppercase; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--gray-100); background: var(--gray-50); }
  td { padding: 13px 16px; font-size: 13px; color: var(--gray-800); border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--gray-50); }
  .level-badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .badge-A { background: var(--green-light); color: var(--green); }
  .badge-B { background: var(--blue-light); color: var(--blue); }
  .badge-C { background: var(--amber-light); color: var(--amber); }
  .change-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
  .change-up { background: var(--green-light); color: var(--green); }
  .change-down { background: var(--red-light); color: var(--red); }
  .change-same { background: var(--gray-100); color: var(--gray-600); }
  .change-new { background: var(--blue-light); color: var(--blue); }
  .swag-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; background: var(--amber-light); color: var(--amber); padding: 3px 8px; border-radius: 4px; font-weight: 500; }
  .topic-pill { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 4px; background: var(--red-light); color: var(--red); margin: 2px 2px 2px 0; }
  .bar-wrap { width: 100%; background: var(--gray-100); border-radius: 99px; height: 6px; margin-top: 4px; }
  .bar-fill { height: 6px; border-radius: 99px; }
  .weak-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .weak-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 14px 16px; }
  .weak-topic { font-size: 13px; font-weight: 500; color: var(--gray-900); margin-bottom: 6px; }
  .weak-count { font-size: 12px; color: var(--gray-600); margin-bottom: 8px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-400); font-size: 14px; }
  .loading { text-align: center; padding: 40px; color: var(--gray-400); font-size: 14px; }

  /* Company filter banner */
  .company-banner { background: var(--blue-light); border: 1px solid #c5d8fb; border-radius: var(--radius-sm); padding: 10px 16px; margin-bottom: 20px; font-size: 13px; color: var(--blue-dark); display: none; align-items: center; justify-content: space-between; }
  .company-banner.show { display: flex; }

  /* PDF PREVIEW */
  #pdf-preview { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 40px; }
  #pdf-preview.show { display: flex; }
  .preview-card { background: var(--white); border-radius: var(--radius); width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
  .preview-header { padding: 20px 24px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--white); z-index: 1; }
  .preview-header h3 { font-size: 16px; font-weight: 500; }
  .preview-body { padding: 32px; }
  .btn-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray-600); line-height: 1; }

  /* Report styles */
  .rpt-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 2px solid var(--blue); }
  .rpt-title { font-size: 22px; font-weight: 300; letter-spacing: -0.02em; }
  .rpt-title strong { font-weight: 500; }
  .rpt-meta { font-size: 12px; color: var(--gray-600); text-align: right; line-height: 1.9; }
  .rpt-company-tag { display: inline-block; background: var(--blue-light); color: var(--blue); font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 99px; margin-top: 6px; }
  .rpt-summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
  .rpt-stat { background: var(--gray-50); border-radius: 8px; padding: 14px; text-align: center; }
  .rpt-stat-val { font-size: 26px; font-weight: 300; letter-spacing: -0.02em; }
  .rpt-stat-label { font-size: 11px; color: var(--gray-600); margin-top: 4px; line-height: 1.4; }
  .rpt-section-title { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 10px; margin-top: 22px; }
  .rpt-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .rpt-table th { text-align: left; padding: 8px 10px; font-size: 11px; color: var(--gray-400); border-bottom: 1px solid var(--gray-200); font-weight: 400; }
  .rpt-table td { padding: 10px 10px; border-bottom: 1px solid var(--gray-100); }
  .rpt-footer { margin-top: 28px; padding-top: 14px; border-top: 1px solid var(--gray-200); font-size: 11px; color: var(--gray-400); display: flex; justify-content: space-between; }

  @media print {
    header, #screen-dash, .preview-header { display: none !important; }
    #pdf-preview { position: static !important; background: none !important; padding: 0 !important; display: block !important; }
    .preview-card { box-shadow: none !important; border-radius: 0 !important; max-height: none !important; }
    .preview-body { padding: 24px !important; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark"><svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="white" stroke-width="1.5"/><path d="M8 4.5v3.5l2 2" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></div>
    <span class="logo-text">谷歌应用广告投放能力测验</span>
    <span class="badge">月度报告</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <a href="admin.html" style="font-size:13px;color:var(--gray-600);text-decoration:none;">← 返回后台</a>
    <button class="btn-action btn-outline" id="btn-logout" style="display:none">退出</button>
  </div>
</header>

<div class="screen active" id="screen-login">
  <div class="login-card">
    <h2>月度报告系统</h2>
    <p>仅供内部团队使用</p>
    <label>密码</label>
    <input type="password" id="admin-pw" placeholder="输入管理员密码">
    <button class="btn-primary" id="btn-login">登录</button>
    <div class="error-msg" id="login-error">密码错误，请重试</div>
  </div>
</div>

<div class="screen" id="screen-dash">
  <div class="dash-top">
    <div>
      <div class="dash-title">应用广告投放能力月度报告</div>
      <div class="dash-sub" id="report-period">正在加载...</div>
    </div>
    <div class="top-actions">
      <select id="company-select"><option value="all">全部公司</option></select>
      <select id="month-select"></select>
      <button class="btn-action btn-outline" id="btn-refresh">刷新</button>
      <button class="btn-action btn-blue" id="btn-preview-pdf">预览 PDF 报告</button>
    </div>
  </div>

  <div class="company-banner" id="company-banner">
    <span id="company-banner-text"></span>
    <button onclick="document.getElementById('company-select').value='all';renderDashboard();" style="background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;">查看全部公司 ✕</button>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">本月参与</div><div class="stat-value" id="stat-total">—</div><div class="stat-sub">客户投手</div></div>
    <div class="stat-card"><div class="stat-label">平均分</div><div class="stat-value" id="stat-avg">—</div><div class="stat-trend" id="stat-avg-trend"></div></div>
    <div class="stat-card"><div class="stat-label">A Level</div><div class="stat-value" id="stat-a" style="color:var(--green)">—</div><div class="stat-sub">进阶投手</div></div>
    <div class="stat-card"><div class="stat-label">有进步</div><div class="stat-value" id="stat-improved" style="color:var(--blue)">—</div><div class="stat-sub">较上月提升</div></div>
    <div class="stat-card"><div class="stat-label">待发 Swag</div><div class="stat-value" id="stat-swag" style="color:var(--amber)">—</div><div class="stat-sub">符合激励条件</div></div>
  </div>

  <div class="section-title">
    <span>投手成绩明细</span>
    <span style="font-size:12px;color:var(--gray-400);font-weight:400;">按本月成绩排序</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>公司</th><th>投手</th><th>本月成绩</th><th>等级</th><th>较上月</th><th>薄弱环节</th><th>激励</th><th>测验时间</th></tr></thead>
      <tbody id="client-tbody"><tr><td colspan="8" class="loading">正在加载...</td></tr></tbody>
    </table>
  </div>

  <div class="section-title"><span id="weak-title">全体薄弱环节 Top 6</span></div>
  <div class="weak-grid" id="weak-grid"></div>
</div>

<div id="pdf-preview">
  <div class="preview-card">
    <div class="preview-header">
      <h3>月度报告预览</h3>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="btn-action btn-blue" id="btn-download-pdf">下载 PDF</button>
        <button class="btn-close" id="btn-close-preview">✕</button>
      </div>
    </div>
    <div class="preview-body" id="preview-body"></div>
  </div>
</div>

<script>
// SUPABASE_URL, SUPABASE_KEY, ADMIN_PASSWORD 从 config.js 读取

let allData = [], currentMonthData = [], prevMonthData = [];
let selectedMonth = '', selectedCompany = 'all';

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('btn-login').onclick = () => {
  if (document.getElementById('admin-pw').value === ADMIN_PASSWORD) {
    show('screen-dash');
    document.getElementById('btn-logout').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
};
document.getElementById('admin-pw').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-login').click(); });
document.getElementById('btn-logout').onclick = () => { show('screen-login'); document.getElementById('admin-pw').value = ''; };
document.getElementById('btn-refresh').onclick = loadData;

async function loadData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/quiz_results?select=*&order=completed_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    allData = await res.json();
    buildSelects();
    renderDashboard();
  } catch(e) {
    document.getElementById('client-tbody').innerHTML = '<tr><td colspan="8" class="empty-state">加载失败，请检查 Supabase 配置</td></tr>';
  }
}

function buildSelects() {
  // Month select
  const months = [...new Set(allData.map(r => r.completed_at.slice(0,7)))].sort().reverse();
  const mSel = document.getElementById('month-select');
  mSel.innerHTML = months.map(m => `<option value="${m}">${formatMonth(m)}</option>`).join('');
  if (!selectedMonth || !months.includes(selectedMonth)) selectedMonth = months[0] || '';
  mSel.value = selectedMonth;
  mSel.onchange = () => { selectedMonth = mSel.value; renderDashboard(); };

  // Company select
  const companies = [...new Set(allData.map(r => r.company).filter(Boolean))].sort();
  const cSel = document.getElementById('company-select');
  cSel.innerHTML = '<option value="all">全部公司</option>' + companies.map(c => `<option value="${c}">${c}</option>`).join('');
  cSel.value = selectedCompany;
  cSel.onchange = () => { selectedCompany = cSel.value; renderDashboard(); };
}

function formatMonth(m) {
  const [y, mo] = m.split('-');
  return `${y}年${parseInt(mo)}月`;
}

function getMonthData(month) {
  return allData.filter(r => r.completed_at.slice(0,7) === month);
}

function getPrevMonth(month) {
  const [y, m] = month.split('-').map(Number);
  return m === 1 ? `${y-1}-12` : `${y}-${String(m-1).padStart(2,'0')}`;
}

function bestPerEmail(data) {
  const map = {};
  data.forEach(r => { if (!map[r.email] || r.percentage > map[r.email].percentage) map[r.email] = r; });
  return Object.values(map);
}

function filterByCompany(data) {
  if (selectedCompany === 'all') return data;
  return data.filter(r => r.company === selectedCompany);
}

function renderDashboard() {
  if (!selectedMonth) return;
  const prev = getPrevMonth(selectedMonth);
  const allCurrentMonth = bestPerEmail(getMonthData(selectedMonth));
  const allPrevMonth = bestPerEmail(getMonthData(prev));
  currentMonthData = filterByCompany(allCurrentMonth);
  prevMonthData = filterByCompany(allPrevMonth);

  // Company banner
  const banner = document.getElementById('company-banner');
  if (selectedCompany !== 'all') {
    banner.className = 'company-banner show';
    document.getElementById('company-banner-text').textContent = `正在查看：${selectedCompany} · ${formatMonth(selectedMonth)}`;
    document.getElementById('weak-title').textContent = `${selectedCompany} 薄弱环节`;
  } else {
    banner.className = 'company-banner';
    document.getElementById('weak-title').textContent = '全体薄弱环节 Top 6';
  }

  const label = selectedCompany === 'all'
    ? `${formatMonth(selectedMonth)} · ${currentMonthData.length} 人参与`
    : `${selectedCompany} · ${formatMonth(selectedMonth)} · ${currentMonthData.length} 人参与`;
  document.getElementById('report-period').textContent = label;

  const total = currentMonthData.length;
  const avg = total ? Math.round(currentMonthData.reduce((s,r) => s+r.percentage,0)/total) : 0;
  const prevAvg = prevMonthData.length ? Math.round(prevMonthData.reduce((s,r) => s+r.percentage,0)/prevMonthData.length) : null;
  const aCount = currentMonthData.filter(r => r.percentage >= 84).length;
  let improved = 0, swagCount = 0;
  currentMonthData.forEach(r => {
    const p = prevMonthData.find(x => x.email === r.email);
    if (p && r.percentage > p.percentage) improved++;
    if (shouldSwag(r, p)) swagCount++;
  });

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-avg').textContent = avg + '%';
  document.getElementById('stat-a').textContent = aCount;
  document.getElementById('stat-improved').textContent = improved;
  document.getElementById('stat-swag').textContent = swagCount;

  if (prevAvg !== null) {
    const diff = avg - prevAvg;
    const el = document.getElementById('stat-avg-trend');
    if (diff > 0) { el.className = 'stat-trend trend-up'; el.textContent = `↑ 较上月 +${diff}%`; }
    else if (diff < 0) { el.className = 'stat-trend trend-down'; el.textContent = `↓ 较上月 ${diff}%`; }
    else { el.className = 'stat-trend trend-same'; el.textContent = '与上月持平'; }
  } else {
    document.getElementById('stat-avg-trend').textContent = '';
  }

  const sorted = [...currentMonthData].sort((a,b) => b.percentage - a.percentage);
  const tbody = document.getElementById('client-tbody');
  if (!sorted.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty-state">暂无记录</td></tr>'; return; }

  tbody.innerHTML = sorted.map(r => {
    const p = prevMonthData.find(x => x.email === r.email);
    const grade = getGrade(r.percentage);
    const badgeClass = {A:'badge-A',B:'badge-B',C:'badge-C'}[grade];
    const change = p ? r.percentage - p.percentage : null;
    let changePill;
    if (change === null) changePill = `<span class="change-pill change-new">首次</span>`;
    else if (change > 0) changePill = `<span class="change-pill change-up">↑ +${change}%</span>`;
    else if (change < 0) changePill = `<span class="change-pill change-down">↓ ${change}%</span>`;
    else changePill = `<span class="change-pill change-same">持平</span>`;
    const wrongPills = (r.wrong_topics||[]).slice(0,2).map(t=>`<span class="topic-pill">${t}</span>`).join('');
    const swag = shouldSwag(r,p) ? `<span class="swag-tag">🎁 建议发Swag</span>` : '—';
    const date = new Date(r.completed_at).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});
    const barColor = r.percentage>=84?'var(--green)':r.percentage>=50?'var(--blue)':'var(--amber)';
    return `<tr>
      <td><strong>${r.company||'—'}</strong></td>
      <td>${r.name||r.email}</td>
      <td><strong>${r.percentage}%</strong><div class="bar-wrap"><div class="bar-fill" style="width:${r.percentage}%;background:${barColor}"></div></div></td>
      <td><span class="level-badge ${badgeClass}">${grade}</span></td>
      <td>${changePill}</td>
      <td>${wrongPills||'<span style="color:var(--gray-400);font-size:12px">—</span>'}</td>
      <td>${swag}</td>
      <td style="color:var(--gray-400);font-size:12px">${date}</td>
    </tr>`;
  }).join('');

  const topicCount = {};
  currentMonthData.forEach(r => (r.wrong_topics||[]).forEach(t => { topicCount[t]=(topicCount[t]||0)+1; }));
  const sortedTopics = Object.entries(topicCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxCount = sortedTopics[0]?.[1]||1;
  const weakGrid = document.getElementById('weak-grid');
  if (!sortedTopics.length) { weakGrid.innerHTML = '<div style="color:var(--gray-400);font-size:13px;grid-column:span 3">暂无薄弱环节数据</div>'; return; }
  weakGrid.innerHTML = sortedTopics.map(([topic,count]) => `
    <div class="weak-card">
      <div class="weak-topic">${topic}</div>
      <div class="weak-count">${count} 人答错（占 ${Math.round(count/total*100)}%）</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(count/maxCount*100)}%;background:var(--red)"></div></div>
    </div>`).join('');
}

function getGrade(pct) {
  if (pct >= 84) return 'A';
  if (pct >= 50) return 'B';
  return 'C';
}

function shouldSwag(curr, prev) {
  const currGrade = getGrade(curr.percentage);
  if (!prev) return currGrade === 'A';
  const prevGrade = getGrade(prev.percentage);
  const diff = curr.percentage - prev.percentage;
  return diff >= 20 || (prevGrade === 'C' && currGrade !== 'C') || (prevGrade === 'B' && currGrade === 'A');
}

document.getElementById('btn-preview-pdf').onclick = () => {
  renderPDFPreview();
  document.getElementById('pdf-preview').classList.add('show');
};
document.getElementById('btn-close-preview').onclick = () => document.getElementById('pdf-preview').classList.remove('show');
document.getElementById('btn-download-pdf').onclick = () => window.print();

function renderPDFPreview() {
  const month = formatMonth(selectedMonth);
  const company = selectedCompany === 'all' ? null : selectedCompany;
  const total = currentMonthData.length;
  const avg = total ? Math.round(currentMonthData.reduce((s,r)=>s+r.percentage,0)/total) : 0;
  const aCount = currentMonthData.filter(r=>r.percentage>=84).length;
  const bCount = currentMonthData.filter(r=>r.percentage>=50&&r.percentage<84).length;
  const cCount = currentMonthData.filter(r=>r.percentage<50).length;
  const prevAvg = prevMonthData.length ? Math.round(prevMonthData.reduce((s,r)=>s+r.percentage,0)/prevMonthData.length) : null;
  const avgChange = prevAvg !== null ? avg - prevAvg : null;
  const sorted = [...currentMonthData].sort((a,b)=>b.percentage-a.percentage);
  const topicCount = {};
  currentMonthData.forEach(r=>(r.wrong_topics||[]).forEach(t=>{topicCount[t]=(topicCount[t]||0)+1;}));
  const topTopics = Object.entries(topicCount).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([t])=>t);
  const topTopic1 = topTopics[0] || '—';

  document.getElementById('preview-body').innerHTML = `
    <div class="rpt-header">
      <div>
        <div style="font-size:11px;font-family:'DM Mono',monospace;letter-spacing:0.1em;color:var(--blue);text-transform:uppercase;margin-bottom:8px;">谷歌应用广告投放能力测验</div>
        <div class="rpt-title"><strong>月度投放能力报告</strong></div>
        <div style="font-size:14px;color:var(--gray-600);margin-top:4px;">${month}</div>
        ${company ? `<div class="rpt-company-tag">${company}</div>` : ''}
      </div>
      <div class="rpt-meta">
        由 Google 出品<br>
        生成时间：${new Date().toLocaleDateString('zh-CN')}<br>
        数据周期：${month}<br>
        ${company ? `客户：${company}` : '全部客户'}
      </div>
    </div>

    <div class="rpt-summary">
      <div class="rpt-stat">
        <div class="rpt-stat-val">${total}</div>
        <div class="rpt-stat-label">参与投手</div>
      </div>
      <div class="rpt-stat">
        <div class="rpt-stat-val" style="color:${avgChange>0?'var(--green)':avgChange<0?'var(--red)':'inherit'}">${avg}%</div>
        <div class="rpt-stat-label">平均答对率${avgChange!==null?`<br>${avgChange>0?'+':''}${avgChange}% vs 上月`:''}</div>
      </div>
      <div class="rpt-stat">
        <div class="rpt-stat-val" style="color:var(--green)">${aCount}</div>
        <div class="rpt-stat-label">A Level 投手</div>
      </div>
      <div class="rpt-stat">
        <div class="rpt-stat-val" style="font-size:15px;color:var(--amber);padding-top:6px">${topTopic1}</div>
        <div class="rpt-stat-label">最大薄弱环节</div>
      </div>
    </div>

    <div class="rpt-section-title">等级分布</div>
    <div style="display:flex;gap:10px;margin-bottom:22px;">
      <div style="flex:${aCount||0.1};background:var(--green-light);border-radius:6px;padding:12px;text-align:center;min-width:60px">
        <div style="font-size:20px;font-weight:300;color:var(--green)">${aCount}</div>
        <div style="font-size:11px;color:var(--green);margin-top:2px">A Level</div>
      </div>
      <div style="flex:${bCount||0.1};background:var(--blue-light);border-radius:6px;padding:12px;text-align:center;min-width:60px">
        <div style="font-size:20px;font-weight:300;color:var(--blue)">${bCount}</div>
        <div style="font-size:11px;color:var(--blue);margin-top:2px">B Level</div>
      </div>
      <div style="flex:${cCount||0.1};background:var(--amber-light);border-radius:6px;padding:12px;text-align:center;min-width:60px">
        <div style="font-size:20px;font-weight:300;color:var(--amber)">${cCount}</div>
        <div style="font-size:11px;color:var(--amber);margin-top:2px">C Level</div>
      </div>
    </div>

    <div class="rpt-section-title">投手成绩明细</div>
    <table class="rpt-table">
      <thead><tr><th>公司</th><th>投手</th><th>本月成绩</th><th>等级</th><th>较上月</th><th>薄弱环节</th></tr></thead>
      <tbody>
        ${sorted.map(r => {
          const p = prevMonthData.find(x=>x.email===r.email);
          const grade = getGrade(r.percentage);
          const change = p ? r.percentage-p.percentage : null;
          const changeStr = change===null?'首次参与':change>0?`↑ +${change}%`:change<0?`↓ ${change}%`:'持平';
          const changeColor = change===null?'var(--blue)':change>0?'var(--green)':change<0?'var(--red)':'var(--gray-400)';
          const gradeColor = grade==='A'?'var(--green)':grade==='B'?'var(--blue)':'var(--amber)';
          const topics = (r.wrong_topics||[]).slice(0,2).join('、')||'—';
          const swag = shouldSwag(r,p)?'🎁 ':'';
          return `<tr>
            <td>${r.company||'—'}</td>
            <td>${swag}${r.name||r.email}</td>
            <td><strong>${r.percentage}%</strong></td>
            <td style="color:${gradeColor};font-weight:500">${grade}</td>
            <td style="color:${changeColor}">${changeStr}</td>
            <td style="color:var(--gray-600)">${topics}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    ${topTopics.length ? `
    <div class="rpt-section-title">本月培训建议</div>
    <div style="background:var(--gray-50);border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.8;color:var(--gray-800);">
      ${company?company+'的':'本月参与测验的'}投手薄弱环节集中在：<strong>${topTopics.join('、')}</strong>。建议在下次沟通中重点覆盖这些领域，可提供相关 one-pager 资料或安排专题培训。
    </div>` : ''}

    <div class="rpt-footer">
      <span>谷歌应用广告投放能力测验 · 内部使用</span>
      <span>${company||'全部客户'} · ${month}</span>
    </div>
  `;
}
</script>
</body>
</html>
